<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>AI Nostradamus | Контроль поставок</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="css/styles.css?v=2026071006" />
  </head>
  <body>
    <main class="home">
      <a class="service-back" href="../">← Сервисы</a>

      <header class="home-header">
        <img
          class="brand-logo"
          src="../assets/ai-nostradamus-logo.png"
          alt="AI Nostradamus"
          width="320"
          height="320"
        />
        <h1 class="home-title">Контроль <span class="accent">поставок</span></h1>
      </header>

      <p class="home-subtitle">Добавьте поставку, отметьте пункты и сохраните. После сохранения редактирование недоступно.</p>

      <div class="service-content">
        <form class="delivery-form" id="delivery-form">
          <div class="field-row">
            <label>
              Номер поставки
              <input id="delivery-number" type="text" required autocomplete="off" placeholder="Например, 32847192" />
            </label>
            <label>
              Склад
              <input id="warehouse" type="text" required autocomplete="off" placeholder="Например, Казань" />
            </label>
          </div>

          <fieldset class="checks-fieldset">
            <legend>Проверка</legend>
            <div class="checks-grid" id="checks-grid"></div>
          </fieldset>

          <div class="form-actions">
            <button class="btn btn-primary" type="submit">Сохранить</button>
          </div>
          <p class="status" id="form-status" data-tone="info">Заполните поля и нажмите «Сохранить».</p>
        </form>

        <section class="saved-section" aria-label="Сохранённые поставки">
          <div class="saved-header">
            <h2>Сохранённые поставки</h2>
            <span class="saved-count" id="saved-count">0</span>
          </div>
          <div class="month-tabs" id="month-tabs" role="tablist" aria-label="Месяцы"></div>
          <div class="saved-groups" id="saved-groups"></div>
        </section>
      </div>
    </main>

    <script type="module" src="js/app.js"></script>
  </body>
</html>
