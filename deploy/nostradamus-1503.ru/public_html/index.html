<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>AI Nostradamus | Сервисы маркетплейса</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="main.css" />
  </head>
  <body>
    <main class="home">
      <header class="home-header">
        <img
          class="brand-logo"
          src="assets/ai-nostradamus-logo.png"
          alt="AI Nostradamus"
          width="140"
          height="140"
        />
        <h1 class="home-title">
          Сервисы для работы <span class="accent">с маркетплейсом</span>
        </h1>
      </header>

      <p class="home-subtitle">
        Набор инструментов для автоматизации, контроля и роста вашего бизнеса
      </p>

      <nav class="service-actions" aria-label="Сервисы">
        <a class="service-btn" href="obuchenie/">
          <span class="service-icon" aria-hidden="true">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8">
              <path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20" />
              <path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z" />
              <path d="M8 7h8M8 11h8" />
            </svg>
          </span>
          <span class="service-label">Учебный центр</span>
        </a>

        <a class="service-btn" href="list/">
          <span class="service-icon" aria-hidden="true">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8">
              <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z" />
              <path d="M14 2v6h6M8 13h8M8 17h8M8 9h2" />
            </svg>
          </span>
          <span class="service-label">Лист сборки</span>
        </a>

        <a class="service-btn service-btn-accent" href="sklad/">
          <span class="service-icon" aria-hidden="true">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8">
              <circle cx="12" cy="12" r="9" />
              <path d="M12 7v5l3 2" />
            </svg>
          </span>
          <span class="service-label">Учет времени</span>
        </a>

        <a class="service-btn" href="cdek/">
          <span class="service-icon" aria-hidden="true">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8">
              <path d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z" />
              <path d="M3.3 7.3 12 12l8.7-4.7M12 22V12" />
            </svg>
          </span>
          <span class="service-label">Сортировка СДЭК</span>
        </a>

        <a class="service-btn" href="proverka_postavok/">
          <span class="service-icon" aria-hidden="true">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8">
              <path d="M1 3h15v13H1z" />
              <path d="M16 8h4l3 3v5h-7V8z" />
              <circle cx="5.5" cy="18.5" r="2.5" />
              <circle cx="18.5" cy="18.5" r="2.5" />
            </svg>
          </span>
          <span class="service-label">Контроль поставок</span>
        </a>

        <a class="service-btn" href="inventa/">
          <span class="service-icon" aria-hidden="true">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8">
              <path d="M20 7H4a2 2 0 0 0-2 2v10a2 2 0 0 0 2 2h16a2 2 0 0 0 2-2V9a2 2 0 0 0-2-2z" />
              <path d="M16 7V5a2 2 0 0 0-2-2h-4a2 2 0 0 0-2 2v2" />
              <path d="M12 12v4M10 14h4" />
            </svg>
          </span>
          <span class="service-label">Inventa</span>
        </a>
      </nav>
    </main>
  </body>
</html>
