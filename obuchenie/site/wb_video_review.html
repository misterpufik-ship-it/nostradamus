<!doctype html>
<html lang="ru">
  <head>
    <meta charset="utf-8" />
    <title>WB video review</title>
    <style>
      * { box-sizing: border-box; }
      html, body { margin: 0; width: 100%; height: 100%; background: #101820; overflow: hidden; }
      video { width: 100vw; height: 100vh; object-fit: contain; background: #101820; }
      #time {
        position: fixed;
        right: 12px;
        bottom: 12px;
        padding: 6px 9px;
        border-radius: 8px;
        background: rgba(0, 0, 0, 0.72);
        color: white;
        font: 700 14px Arial, sans-serif;
      }
    </style>
  </head>
  <body>
    <video id="source" src="../Videos/Поставка на Вб через Селсап.mp4" muted controls preload="auto"></video>
    <div id="time">0.0</div>
    <script>
      const video = document.querySelector("#source");
      const time = document.querySelector("#time");
      video.addEventListener("timeupdate", () => {
        time.textContent = `${video.currentTime.toFixed(1)} / ${video.duration ? video.duration.toFixed(1) : "?"}`;
      });
      window.seekTo = async (seconds) => {
        await new Promise((resolve) => {
          if (video.readyState >= 1) resolve();
          else video.addEventListener("loadedmetadata", resolve, { once: true });
        });
        video.currentTime = Math.min(seconds, Math.max(0, video.duration - 0.2));
        await new Promise((resolve) => video.addEventListener("seeked", resolve, { once: true }));
        time.textContent = `${video.currentTime.toFixed(1)} / ${video.duration.toFixed(1)}`;
        return { currentTime: video.currentTime, duration: video.duration };
      };
    </script>
  </body>
</html>
